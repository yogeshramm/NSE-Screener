name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH deploy + health check + auto-rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          port:     ${{ secrets.PROD_SSH_PORT || 22 }}
          command_timeout: 8m
          script: |
            set -e
            cd /home/yointell/NSE-Screener
            VENV_PIP=/home/yointell/NSE-Screener/.venv/bin/pip

            # Preserve runtime state across reset --hard
            mkdir -p /tmp/yointell_runtime
            for f in users.json watchlist.json portfolio.json .auth_secret yointell.db yointell.db-wal yointell.db-shm; do
              [ -f "config/$f" ] && cp "config/$f" "/tmp/yointell_runtime/$f"
            done
            # Preserve per-user portfolio and watchlist files
            for f in config/portfolio_*.json config/watchlist_*.json; do
              [ -f "$f" ] && cp "$f" "/tmp/yointell_runtime/$(basename $f)"
            done
            # Preserve analyst cache (server-side rich data: MC, screener_eps, tt_forecasts)
            # GHA commits stripped TL/TT-only files; server cache has the full picture
            if [ -d "data_store/analyst" ]; then
              mkdir -p /tmp/yointell_runtime/analyst
              find data_store/analyst -name '*__1y.json' -exec cp {} /tmp/yointell_runtime/analyst/ \; 2>/dev/null || true
            fi

            BEFORE=$(git rev-parse HEAD)
            echo "→ before: $BEFORE"

            # Rollback handler — runs on ANY failure after this point
            rollback() {
              echo "✗ deploy failed — rolling back to $BEFORE"
              git reset --hard "$BEFORE" || true
              for f in users.json watchlist.json portfolio.json .auth_secret yointell.db yointell.db-wal yointell.db-shm; do
                [ -f "/tmp/yointell_runtime/$f" ] && cp "/tmp/yointell_runtime/$f" "config/$f"
              done
              for f in /tmp/yointell_runtime/portfolio_*.json /tmp/yointell_runtime/watchlist_*.json; do
                [ -f "$f" ] && cp "$f" "config/$(basename $f)"
              done
              [ -d "/tmp/yointell_runtime/analyst" ] && cp /tmp/yointell_runtime/analyst/*__1y.json data_store/analyst/ 2>/dev/null || true
              sudo systemctl restart yointell || true
              sleep 3
              curl -fsS http://localhost:8000/data/status >/dev/null && echo "✓ rollback healthy"
              rm -rf /tmp/yointell_runtime
              exit 1
            }
            trap rollback ERR

            git fetch origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)
            echo "→ after:  $AFTER"

            # Restore runtime state immediately after reset
            for f in users.json watchlist.json portfolio.json .auth_secret yointell.db yointell.db-wal yointell.db-shm; do
              [ -f "/tmp/yointell_runtime/$f" ] && cp "/tmp/yointell_runtime/$f" "config/$f"
            done
            # Restore per-user portfolio and watchlist files
            for f in /tmp/yointell_runtime/portfolio_*.json /tmp/yointell_runtime/watchlist_*.json; do
              [ -f "$f" ] && cp "$f" "config/$(basename $f)"
            done
            # Restore analyst cache — merge: server's rich data wins for non-TL fields,
            # GHA's freshly committed trendlyne/tickertape fields are overlaid on top
            if [ -d "/tmp/yointell_runtime/analyst" ]; then
              mkdir -p data_store/analyst
              /home/yointell/NSE-Screener/.venv/bin/python3 - <<'PYEOF'
import json, os
from pathlib import Path
backup_dir = Path("/tmp/yointell_runtime/analyst")
live_dir   = Path("/home/yointell/NSE-Screener/data_store/analyst")
merged = failed = 0
for gha_path in live_dir.glob("*__1y.json"):
    bak_path = backup_dir / gha_path.name
    if not bak_path.exists():
        continue  # new stock in GHA — keep GHA version as-is
    try:
        gha  = json.loads(gha_path.read_text())
        bak  = json.loads(bak_path.read_text())
        # Base = server backup (has MC, screener_eps, tt_forecasts)
        out  = {**bak}
        # Overlay GHA's fresh TL/TT if present
        if gha.get("trendlyne"):  out["trendlyne"]  = gha["trendlyne"]
        if gha.get("tickertape"): out["tickertape"]  = gha["tickertape"]
        if gha.get("_gh_updated"):out["_gh_updated"] = gha["_gh_updated"]
        gha_path.write_text(json.dumps(out))
        merged += 1
    except Exception:
        failed += 1
print(f"Analyst cache merge: {merged} merged, {failed} failed, {sum(1 for _ in live_dir.glob('*__1y.json'))-merged-failed} gha-only kept")
PYEOF
            fi

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "✓ already up-to-date — nothing to deploy"
              trap - ERR
              rm -rf /tmp/yointell_runtime
              exit 0
            fi

            # Install new deps only if requirements.txt changed (use venv pip)
            if git diff --name-only "$BEFORE" "$AFTER" | grep -q '^requirements.txt$'; then
              echo "→ requirements.txt changed — installing into .venv"
              "$VENV_PIP" install -q -r requirements.txt
            fi

            sudo systemctl restart yointell
            echo "→ service restarted"

            # Health check — 5 attempts, 2s apart
            for i in 1 2 3 4 5; do
              sleep 2
              if curl -fsS http://localhost:8000/data/status >/dev/null 2>&1; then
                echo "✓ health check passed (attempt $i)"
                trap - ERR
                rm -rf /tmp/yointell_runtime
                exit 0
              fi
              echo "  attempt $i failed, retrying…"
            done
            false  # triggers rollback trap
