name: Fetch Analyst Ratings (Trendlyne + Tickertape)

# Runs daily after market close (16:30 IST = 11:00 UTC)
# Also runnable manually from GitHub → Actions tab
on:
  schedule:
    - cron: '0 11 * * 1-5'   # Mon-Fri 11:00 UTC = 16:30 IST
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Specific symbols (comma-separated) — leave blank for full Nifty 500'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet cloudscraper curl-cffi requests

      - name: Fetch Trendlyne + Tickertape analyst data
        env:
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
        run: |
          python3 .github/scripts/fetch_analyst_cache.py

      - name: Commit analyst cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_store/analyst/ || true
          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No changes — cache already up to date."
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: analyst cache refresh — ${COUNT} stocks updated [skip ci]"
            git push
          fi
