name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin
        working-directory: android-app

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: android-app

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Decode production keystore
        env:
          KEYSTORE_B64: ${{ secrets.MONEYSTX_KEYSTORE_B64 }}
        run: |
          mkdir -p android-app/keystore
          echo "$KEYSTORE_B64" | base64 --decode > android-app/keystore/moneystx-release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH:  ${{ github.workspace }}/android-app/keystore/moneystx-release.jks
          STORE_PASSWORD: ${{ secrets.MONEYSTX_STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.MONEYSTX_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon
        working-directory: android-app

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-release-signed
          path: android-app/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90

      - name: Show APK sizes
        run: find android-app/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
