name: Build Android APK

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'android-twa/**'
  workflow_dispatch:   # manual: Actions tab → "Build Android APK" → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 is required by Android Gradle Plugin 8.x
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # setup-gradle handles wrapper bootstrap — no gradle-wrapper.jar in repo needed
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      # Bootstrap the wrapper jar so `./gradlew` works for future local builds too
      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin
        working-directory: android-twa

      # Build debug APK — no signing secrets needed, good for quick testing
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: android-twa

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-debug
          path: android-twa/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ── Signed release APK (production keystore from GitHub Secrets) ─────────
      - name: Decode production keystore
        env:
          KEYSTORE_B64: ${{ secrets.MONEYSTX_KEYSTORE_B64 }}
        run: |
          mkdir -p android-twa/keystore
          echo "$KEYSTORE_B64" | base64 --decode > android-twa/keystore/moneystx-release.jks
          ls -lh android-twa/keystore/

      - name: Build signed release APK
        env:
          KEYSTORE_PATH:  ${{ github.workspace }}/android-twa/keystore/moneystx-release.jks
          STORE_PASSWORD: ${{ secrets.MONEYSTX_STORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.MONEYSTX_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon
        working-directory: android-twa

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-release-signed
          path: android-twa/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90

      - name: Show APK sizes
        run: |
          echo "=== APKs built ==="
          find android-twa/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
