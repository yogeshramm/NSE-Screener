name: Build Android APK

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'android-twa/**'
  workflow_dispatch:   # manual: Actions tab → "Build Android APK" → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 is required by Android Gradle Plugin 8.x
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # setup-gradle handles wrapper bootstrap — no gradle-wrapper.jar in repo needed
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      # Bootstrap the wrapper jar so `./gradlew` works for future local builds too
      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin
        working-directory: android-twa

      # Build debug APK — no signing secrets needed
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: android-twa

      # Upload debug APK (downloadable from Actions tab for 90 days)
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-debug
          path: android-twa/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # Build release APK (signed with debug key — installable via sideload)
      - name: Build release APK
        run: gradle assembleRelease --no-daemon
        working-directory: android-twa

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: MONEYSTX-android-release
          path: android-twa/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90

      - name: Show APK sizes
        run: |
          echo "=== APKs built ==="
          find android-twa/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      # ── Print SHA-256 fingerprint for assetlinks.json ──────────────────────
      # Copy this fingerprint into api/app.py → _ASSET_LINKS_FINGERPRINTS
      # to enable full-screen TWA (no URL bar) on Android.
      - name: Print signing certificate SHA-256 (for assetlinks.json)
        run: |
          APK=android-twa/app/build/outputs/apk/debug/app-debug.apk
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo " MONEYSTX APK signing fingerprint"
          echo " Paste into api/app.py → _ASSET_LINKS_FINGERPRINTS"
          echo "══════════════════════════════════════════════════════════"
          keytool -printcert -jarfile "$APK" 2>/dev/null | grep -i "SHA256:" || \
          keytool -printcert -jarfile "$APK" 2>/dev/null || \
          echo "(keytool not available — check apksigner below)"
          echo ""
          # Alternative using apksigner from Android build tools
          $ANDROID_HOME/build-tools/*/apksigner verify --print-certs "$APK" 2>/dev/null || true
          echo "══════════════════════════════════════════════════════════"
